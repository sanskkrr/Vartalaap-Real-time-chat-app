<!DOCTYPE html>
<html>
<head>
  <title>Vartalaap Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white h-screen flex flex-col md:flex-row">

<!-- Sidebar -->
<div id="sidebar"
  class="hidden md:flex md:w-1/4 bg-gray-900 border-r border-gray-800 flex-col">

  <div class="p-4 border-b border-gray-800">
    <h2 class="text-lg font-semibold">💬 Vartalaap</h2>
  </div>

  <ul id="userList" class="flex-1 overflow-y-auto p-2 space-y-2"></ul>

</div>

<!-- Chat Area -->
<div class="flex-1 flex flex-col">

  <!-- Header -->
  <div class="bg-gray-900 p-4 border-b border-gray-800 flex items-center gap-3">

    <!-- Mobile Menu Button -->
    <button onclick="toggleSidebar()" class="md:hidden text-xl">☰</button>

    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
      👤
    </div>

    <h2 id="chatUser" class="font-medium">Select a user</h2>
  </div>

  <!-- Messages -->
  <div id="chat"
    class="flex-1 p-3 sm:p-4 overflow-y-auto flex flex-col gap-3">
  </div>

  <!-- Input -->
  <div class="p-2 sm:p-3 bg-gray-900 border-t border-gray-800 flex gap-2">

    <input id="message" placeholder="Type message..."
      class="flex-1 p-2 sm:p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <button onclick="sendMessage()"
      class="bg-blue-500 px-4 sm:px-5 rounded-lg font-semibold">
      ➤
    </button>

  </div>

</div>

<!-- Mobile Sidebar Overlay -->
<div id="mobileSidebar"
  class="fixed inset-0 bg-black/60 hidden z-50">

  <div class="w-3/4 h-full bg-gray-900 p-4">

    <button onclick="toggleSidebar()" class="mb-4">❌ Close</button>

    <ul id="userListMobile" class="space-y-2"></ul>

  </div>
</div>

<script>
function toggleSidebar() {
  const el = document.getElementById("mobileSidebar");
  el.classList.toggle("hidden");
}
</script>

<script type="module" src="js/chat.js"></script>
</body>
</html>

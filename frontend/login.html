<!DOCTYPE html>
<html>
<head>
  <title>Login - Vartalaap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="js/login.js"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">

<!-- Background Particles (optional container) -->
<div class="fixed inset-0 -z-10 bg-gradient-to-br from-gray-900 via-gray-800 to-black"></div>

<!-- Card -->
<div class="w-full max-w-md bg-gray-900/80 backdrop-blur-xl border border-gray-800 rounded-2xl shadow-2xl p-6 sm:p-8">

  <!-- Logo / Title -->
  <div class="text-center mb-6">
    <h1 class="text-3xl sm:text-4xl font-bold">💬 Vartalaap</h1>
    <p class="text-gray-400 text-sm mt-1">Welcome back, login to continue</p>
  </div>

  <!-- Form -->
  <div class="space-y-4">

    <!-- Email -->
    <div>
      <label class="text-sm text-gray-400">Email</label>
      <input id="email" type="email" placeholder="Enter your email"
        class="w-full mt-1 p-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
    </div>

    <!-- Password -->
    <div>
      <label class="text-sm text-gray-400">Password</label>
      <div class="relative">
        <input id="password" type="password" placeholder="Enter password"
          class="w-full mt-1 p-3 pr-10 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        
        <!-- Show/Hide -->
        <span onclick="togglePassword()" 
          class="absolute right-3 top-4 text-gray-400 cursor-pointer text-sm">
          👁
        </span>
      </div>
    </div>

  </div>

  <!-- Button -->
  <button id="loginBtn"
    class="w-full mt-6 bg-blue-500 hover:bg-blue-600 active:scale-95 transition p-3 rounded-lg font-semibold shadow-lg">
    Login
  </button>

  <!-- Divider -->
  <div class="flex items-center my-6">
    <div class="flex-1 h-px bg-gray-700"></div>
    <span class="px-3 text-gray-400 text-xs">OR</span>
    <div class="flex-1 h-px bg-gray-700"></div>
  </div>

  <!-- Footer -->
  <p class="text-center text-sm text-gray-400">
    Don’t have an account?
    <span class="text-blue-400 hover:underline cursor-pointer">
      Sign up
    </span>
  </p>

</div>

<!-- JS -->
<script type="module" src="js/login.js"></script>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
